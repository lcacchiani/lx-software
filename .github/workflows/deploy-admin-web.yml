name: Deploy Admin Web

on:
  push:
    branches: [main]
    paths: ["apps/admin_web/**", "scripts/deploy/deploy-admin-www.sh"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-admin-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/admin_web/package-lock.json

      - run: npm ci
        working-directory: apps/admin_web

      - run: npm run build
        working-directory: apps/admin_web
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.ADMIN_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.ADMIN_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.ADMIN_COGNITO_DOMAIN }}
          VITE_COGNITO_REDIRECT_URI: https://admin.lx-software.com/auth/callback
          VITE_API_BASE_URL: ${{ vars.ADMIN_API_BASE_URL }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - run: bash scripts/deploy/deploy-admin-www.sh
