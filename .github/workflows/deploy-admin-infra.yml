name: Deploy Admin Infra

on:
  push:
    branches: [main]
    paths: ["backend/infrastructure/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/infrastructure/package-lock.json

      - run: npm ci && npm run build
        working-directory: backend/infrastructure

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: cdk deploy
        working-directory: backend/infrastructure
        run: |
          # CDK advisory 34892 (legacy OAI/OAC migration noise); acknowledge so
          # synth/deploy is not blocked in accounts where the notice is active.
          npx cdk acknowledge 34892 || true
          npx cdk deploy lx-admin-auth lx-admin-data lx-admin-assets lx-admin-api lx-admin-web \
            --require-approval never \
            --parameters lx-admin-auth:AdminWebDomainName=admin.lx-software.com \
            --parameters lx-admin-auth:GoogleClientId=${{ vars.ADMIN_GOOGLE_CLIENT_ID }} \
            --parameters lx-admin-auth:GoogleClientSecret=${{ secrets.ADMIN_GOOGLE_CLIENT_SECRET }} \
            --parameters lx-admin-auth:AdminFederatedEmailAllowlist=${{ vars.ADMIN_FEDERATED_EMAIL_ALLOWLIST }} \
            --parameters lx-admin-auth:AdminBootstrapEmail=${{ vars.ADMIN_BOOTSTRAP_EMAIL }} \
            --parameters lx-admin-auth:AdminBootstrapTempPassword=${{ secrets.ADMIN_BOOTSTRAP_TEMP_PASSWORD }} \
            --parameters lx-admin-auth:CognitoDomainPrefix=lx-admin-auth \
            --parameters lx-admin-web:AdminWebDomainName=admin.lx-software.com \
            --parameters lx-admin-web:AdminWebCertificateArn=${{ vars.ADMIN_ACM_CERT_ARN }}
