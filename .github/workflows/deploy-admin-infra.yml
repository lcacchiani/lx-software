name: Deploy Admin Infra

on:
  push:
    branches: [main]
    paths: ["backend/infrastructure/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/infrastructure/package-lock.json

      - run: npm ci && npm run build
        working-directory: backend/infrastructure

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: cdk deploy
        working-directory: backend/infrastructure
        env:
          P_GOOGLE_CLIENT_ID: ${{ vars.ADMIN_GOOGLE_CLIENT_ID }}
          P_GOOGLE_CLIENT_SECRET: ${{ secrets.ADMIN_GOOGLE_CLIENT_SECRET }}
          P_EMAIL_ALLOWLIST: ${{ vars.ADMIN_FEDERATED_EMAIL_ALLOWLIST }}
          P_BOOTSTRAP_EMAIL: ${{ vars.ADMIN_BOOTSTRAP_EMAIL }}
          P_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_TEMP_PASSWORD }}
          P_ACM_CERT_ARN: ${{ vars.ADMIN_ACM_CERT_ARN }}
        run: |
          set -eo pipefail
          # CDK advisory 34892: acknowledge legacy OAI/OAC migration notice so synth is not blocked.
          npx cdk acknowledge 34892 || true
          npx cdk deploy lx-admin-auth lx-admin-data lx-admin-assets lx-admin-api lx-admin-web \
            --require-approval never \
            --parameters lx-admin-auth:AdminWebDomainName=admin.lx-software.com \
            --parameters "lx-admin-auth:GoogleClientId=${P_GOOGLE_CLIENT_ID}" \
            --parameters "lx-admin-auth:GoogleClientSecret=${P_GOOGLE_CLIENT_SECRET}" \
            --parameters "lx-admin-auth:AdminFederatedEmailAllowlist=${P_EMAIL_ALLOWLIST}" \
            --parameters "lx-admin-auth:AdminBootstrapEmail=${P_BOOTSTRAP_EMAIL}" \
            --parameters "lx-admin-auth:AdminBootstrapTempPassword=${P_BOOTSTRAP_PASSWORD}" \
            --parameters lx-admin-auth:CognitoDomainPrefix=lx-admin-auth \
            --parameters lx-admin-web:AdminWebDomainName=admin.lx-software.com \
            --parameters "lx-admin-web:AdminWebCertificateArn=${P_ACM_CERT_ARN}"
