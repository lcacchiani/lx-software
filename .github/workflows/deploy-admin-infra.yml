name: Deploy Admin Infra

on:
  push:
    branches: [main]
    paths: ["backend/infrastructure/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/infrastructure/package-lock.json

      - run: npm ci && npm run build
        working-directory: backend/infrastructure

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Check CDK bootstrap status
        run: |
          QUALIFIER="${CDK_BOOTSTRAP_QUALIFIER:-hnb659fds}"
          SSM_PARAM="/cdk-bootstrap/${QUALIFIER}/version"
          echo "Checking for CDK bootstrap in account $AWS_ACCOUNT_ID region $AWS_REGION (qualifier=$QUALIFIER)..."
          if ! aws ssm get-parameter --name "$SSM_PARAM" --query "Parameter.Value" --output text 2>/dev/null; then
            echo ""
            echo "::error::CDK bootstrap not found or not accessible."
            echo "::error::The SSM parameter '$SSM_PARAM' could not be read."
            echo ""
            echo "Fix (from a machine with admin AWS credentials):"
            echo "  npx cdk bootstrap aws://$AWS_ACCOUNT_ID/$AWS_REGION"
            echo ""
            echo "If you use a custom bootstrap qualifier, set GitHub variable CDK_BOOTSTRAP_QUALIFIER"
            echo "to match and ensure this repo's bin/app.ts / CDK CLI use the same qualifier."
            echo ""
            echo "If bootstrap exists but this job still fails:"
            echo "  - GitHubActionsRole needs ssm:GetParameter on /cdk-bootstrap/*"
            echo "  - GitHubActionsRole needs sts:AssumeRole on arn:aws:iam::$AWS_ACCOUNT_ID:role/cdk-${QUALIFIER}-*-role-*"
            echo "  - CDK deploy/file-publish roles must trust GitHubActionsRole (or your org's deploy principal)"
            echo ""
            exit 1
          fi
          echo "CDK bootstrap found (version: $(aws ssm get-parameter --name "$SSM_PARAM" --query "Parameter.Value" --output text)). Proceeding..."
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CDK_BOOTSTRAP_QUALIFIER: ${{ vars.CDK_BOOTSTRAP_QUALIFIER }}

      - name: cdk deploy
        working-directory: backend/infrastructure
        env:
          CDK_BOOTSTRAP_QUALIFIER: ${{ vars.CDK_BOOTSTRAP_QUALIFIER }}
          P_GOOGLE_CLIENT_ID: ${{ vars.ADMIN_GOOGLE_CLIENT_ID }}
          P_GOOGLE_CLIENT_SECRET: ${{ secrets.ADMIN_GOOGLE_CLIENT_SECRET }}
          P_EMAIL_ALLOWLIST: ${{ vars.ADMIN_FEDERATED_EMAIL_ALLOWLIST }}
          P_BOOTSTRAP_EMAIL: ${{ vars.ADMIN_BOOTSTRAP_EMAIL }}
          P_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_TEMP_PASSWORD }}
          P_ACM_CERT_ARN: ${{ vars.ADMIN_ACM_CERT_ARN }}
        run: |
          set -eo pipefail
          # CDK advisory 34892: acknowledge legacy OAI/OAC migration notice so synth is not blocked.
          npx cdk acknowledge 34892 || true
          npx cdk deploy lx-admin-auth lx-admin-data lx-admin-assets lx-admin-api lx-admin-web \
            --require-approval never \
            --parameters lx-admin-auth:AdminWebDomainName=admin.lx-software.com \
            --parameters "lx-admin-auth:GoogleClientId=${P_GOOGLE_CLIENT_ID}" \
            --parameters "lx-admin-auth:GoogleClientSecret=${P_GOOGLE_CLIENT_SECRET}" \
            --parameters "lx-admin-auth:AdminFederatedEmailAllowlist=${P_EMAIL_ALLOWLIST}" \
            --parameters "lx-admin-auth:AdminBootstrapEmail=${P_BOOTSTRAP_EMAIL}" \
            --parameters "lx-admin-auth:AdminBootstrapTempPassword=${P_BOOTSTRAP_PASSWORD}" \
            --parameters lx-admin-auth:CognitoDomainPrefix=lx-admin-auth \
            --parameters lx-admin-web:AdminWebDomainName=admin.lx-software.com \
            --parameters "lx-admin-web:AdminWebCertificateArn=${P_ACM_CERT_ARN}"
