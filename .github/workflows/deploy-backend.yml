name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ["backend/infrastructure/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: backend/infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Install CDK dependencies
        run: |
          if [ ! -f "backend/infrastructure/package.json" ]; then
            echo "Missing backend/infrastructure/package.json"
            exit 1
          fi
          cd backend/infrastructure
          npm ci

      - name: Build CDK app
        run: |
          cd backend/infrastructure
          npm run build --if-present

      - name: Check CDK Bootstrap status
        run: |
          QUALIFIER="${CDK_BOOTSTRAP_QUALIFIER:-hnb659fds}"
          SSM_PARAM="/cdk-bootstrap/${QUALIFIER}/version"
          echo "Checking for CDK Bootstrap in account $AWS_ACCOUNT_ID region $AWS_REGION (qualifier=$QUALIFIER)..."
          if ! aws ssm get-parameter --name "$SSM_PARAM" --query "Parameter.Value" --output text 2>/dev/null; then
            echo ""
            echo "::error::CDK Bootstrap not found or not accessible."
            echo "::error::The SSM parameter '$SSM_PARAM' could not be read."
            echo ""
            echo "Possible causes:"
            echo "  1. CDK Bootstrap missing: run 'npx cdk bootstrap aws://$AWS_ACCOUNT_ID/$AWS_REGION'"
            echo "  2. Permission denied: GitHubActionsRole needs ssm:GetParameter on /cdk-bootstrap/*"
            echo "  3. Wrong region: Verify AWS_REGION matches the bootstrapped region"
            echo ""
            echo "If you use a custom bootstrap qualifier, set GitHub variable CDK_BOOTSTRAP_QUALIFIER"
            echo "to match this repo's bin/app.ts / CDK CLI."
            echo ""
            echo "If CDK Bootstrap exists but this job still fails:"
            echo "  - GitHubActionsRole needs sts:AssumeRole on arn:aws:iam::$AWS_ACCOUNT_ID:role/cdk-${QUALIFIER}-*-role-*"
            echo "  - CDK deploy/file-publish roles must trust GitHubActionsRole (or your org's deploy principal)"
            echo ""
            exit 1
          fi
          echo "CDK Bootstrap found (version: $(aws ssm get-parameter --name "$SSM_PARAM" --query "Parameter.Value" --output text)). Proceeding with deployment..."
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CDK_BOOTSTRAP_QUALIFIER: ${{ vars.CDK_BOOTSTRAP_QUALIFIER }}

      - name: Deploy CDK stacks
        working-directory: backend/infrastructure
        env:
          CDK_PARAM_FILE: ${{ vars.CDK_PARAM_FILE }}
          CDK_BOOTSTRAP_QUALIFIER: ${{ vars.CDK_BOOTSTRAP_QUALIFIER }}
          P_GOOGLE_CLIENT_ID: ${{ vars.ADMIN_GOOGLE_CLIENT_ID }}
          P_GOOGLE_CLIENT_SECRET: ${{ secrets.ADMIN_GOOGLE_CLIENT_SECRET }}
          P_EMAIL_ALLOWLIST: ${{ vars.ADMIN_FEDERATED_EMAIL_ALLOWLIST }}
          P_BOOTSTRAP_EMAIL: ${{ vars.ADMIN_BOOTSTRAP_EMAIL }}
          P_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_TEMP_PASSWORD }}
          P_ACM_CERT_ARN: ${{ vars.ADMIN_ACM_CERT_ARN }}
        run: |
          set -eo pipefail
          npx cdk acknowledge 34892 || true

          # Three stacks (post-consolidation):
          #   1. lxsoftware-public-www  (S3 + CloudFront for the marketing site)
          #   2. lxsoftware             (Cognito + DynamoDB + S3 assets + HTTP API)
          #   3. lxsoftware-admin-web   (S3 + CloudFront for the admin SPA)
          PUBLIC_STACK="lxsoftware-public-www"
          ADMIN_STACKS=(lxsoftware lxsoftware-admin-web)

          PUBLIC_PARAM_ARGS=()
          ADMIN_LX_PARAM_ARGS=()
          ADMIN_WEB_PARAM_ARGS=()
          resolve_param_file() {
            local path="$1"
            if [ -z "$path" ]; then
              return 1
            fi
            if [ -f "$path" ]; then
              echo "$path"
              return 0
            fi
            if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -f "$GITHUB_WORKSPACE/$path" ]; then
              echo "$GITHUB_WORKSPACE/$path"
              return 0
            fi
            return 1
          }
          if [ -n "${CDK_PARAM_FILE:-}" ]; then
            RESOLVED_PARAM_FILE=$(resolve_param_file "$CDK_PARAM_FILE" || true)
            if [ -n "$RESOLVED_PARAM_FILE" ]; then
              PUBLIC_PARAM_FILE="$(mktemp)"
              ADMIN_LX_PARAM_FILE="$(mktemp)"
              ADMIN_WEB_PARAM_FILE="$(mktemp)"
              jq -r 'to_entries[] | select(.value != null) | .value = (if .value | type == "string" then .value else .value | tostring end) | .value = (.value | gsub("\r\n"; "\n") | gsub("\r"; "\n") | gsub("\n"; "\\n") | ltrimstr(" ") | rtrimstr(" ")) | select(.value != "") | select((.key | contains(":") | not) or (.key | startswith("lxsoftware-public-www:"))) | .key = (if (.key | test(":")) then .key else "lxsoftware-public-www:\(.key)" end) | "--parameters", "\(.key)=\(.value)"' "$RESOLVED_PARAM_FILE" > "$PUBLIC_PARAM_FILE"
              jq -r 'to_entries[] | select(.value != null) | .value = (if .value | type == "string" then .value else .value | tostring end) | .value = (.value | gsub("\r\n"; "\n") | gsub("\r"; "\n") | gsub("\n"; "\\n") | ltrimstr(" ") | rtrimstr(" ")) | select(.value != "") | select(.key | test("^lxsoftware:")) | "--parameters", "\(.key)=\(.value)"' "$RESOLVED_PARAM_FILE" > "$ADMIN_LX_PARAM_FILE"
              jq -r 'to_entries[] | select(.value != null) | .value = (if .value | type == "string" then .value else .value | tostring end) | .value = (.value | gsub("\r\n"; "\n") | gsub("\r"; "\n") | gsub("\n"; "\\n") | ltrimstr(" ") | rtrimstr(" ")) | select(.value != "") | select(.key | test("^lxsoftware-admin-web:")) | "--parameters", "\(.key)=\(.value)"' "$RESOLVED_PARAM_FILE" > "$ADMIN_WEB_PARAM_FILE"
              readarray -t PUBLIC_PARAM_ARGS < "$PUBLIC_PARAM_FILE"
              readarray -t ADMIN_LX_PARAM_ARGS < "$ADMIN_LX_PARAM_FILE"
              readarray -t ADMIN_WEB_PARAM_ARGS < "$ADMIN_WEB_PARAM_FILE"
            else
              echo "CDK_PARAM_FILE '$CDK_PARAM_FILE' not found"
              exit 1
            fi
          fi

          # Deploy the public website stack first: only parameters for
          # lxsoftware-public-www (unprefixed keys or lxsoftware-public-www:*).
          npx cdk deploy --require-approval never \
            "${PUBLIC_PARAM_ARGS[@]}" \
            "$PUBLIC_STACK"

          # Backend + admin SPA: Cognito/Dynamo/API + CloudFront. The two stacks
          # are listed in dependency order; CDK additionally honours the
          # cross-stack import graph automatically, so `lxsoftware` is always
          # updated *first* (publishing any new Outputs / cross-stack exports it
          # introduces) before `lxsoftware-admin-web` consumes them.
          #
          # We deliberately do NOT use `--exclusively` here: that flag would skip
          # `lxsoftware` and CloudFormation would then fail to resolve any new
          # `Fn::ImportValue` references admin-web added in the same PR (e.g. the
          # AssetsBucket DomainName / RegionalDomainName exports added for the
          # CSP connect-src allow-list). All `lxsoftware:*` AND
          # `lxsoftware-admin-web:*` parameters are forwarded together, so the
          # earlier two-phase split (originally added to drop a stale
          # UserPoolDomain export, since cleaned up) is no longer needed.
          npx cdk deploy --require-approval never \
            "${ADMIN_LX_PARAM_ARGS[@]}" \
            "${ADMIN_WEB_PARAM_ARGS[@]}" \
            --parameters lxsoftware:AdminWebDomainName=admin.lx-software.com \
            --parameters "lxsoftware:GoogleClientId=${P_GOOGLE_CLIENT_ID}" \
            --parameters "lxsoftware:GoogleClientSecret=${P_GOOGLE_CLIENT_SECRET}" \
            --parameters "lxsoftware:AdminFederatedEmailAllowlist=${P_EMAIL_ALLOWLIST}" \
            --parameters "lxsoftware:AdminBootstrapEmail=${P_BOOTSTRAP_EMAIL}" \
            --parameters "lxsoftware:AdminBootstrapTempPassword=${P_BOOTSTRAP_PASSWORD}" \
            --parameters lxsoftware:CognitoDomainPrefix=lxsoftware-admin-auth \
            --parameters lxsoftware-admin-web:AdminWebDomainName=admin.lx-software.com \
            --parameters "lxsoftware-admin-web:AdminWebCertificateArn=${P_ACM_CERT_ARN}" \
            "${ADMIN_STACKS[@]}"
