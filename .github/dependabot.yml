# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # GitHub Actions - keep CI secure and up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # NPM - Public website
  - package-ecosystem: "npm"
    directory: "/apps/public_www"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "web"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # NPM - Admin SPA
  - package-ecosystem: "npm"
    directory: "/apps/admin_web"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "admin"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # NPM - CDK infrastructure
  - package-ecosystem: "npm"
    directory: "/backend/infrastructure"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "infrastructure"
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version updates - review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # fast-uri is bundled inside aws-cdk-lib's tarball (via table -> ajv).
      # The package.json `overrides` block pins ^3.1.2 for any non-bundled copy
      # but cannot replace the bundled copy. The bundled copy runs only at
      # CDK synth time and never receives attacker-controlled URIs. Re-evaluate
      # if aws-cdk-lib unbundles `table` upstream.
      - dependency-name: "fast-uri"

